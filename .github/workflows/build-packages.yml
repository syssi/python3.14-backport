name: Build and publish packages
on:
  workflow_dispatch:
    inputs:
      changelog_message:
        description: 'Changelog message to add (in addition to "Rebuild for...")'
        type: string

jobs:
  native:
    runs-on: ubuntu-latest
    name: Build native packages

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: env.BUILDKIT_STEP_LOG_MAX_SIZE=4194304

      - name: Generate Bake override file
        run: |
          cat <<EOF > docker-bake.override.hcl
          target "github_output" {
            contexts = {
              native = "target:native"
            }
            dockerfile-inline = <<-EOT
            FROM debian:trixie-slim AS github_output
            COPY --from=native /github_outpu[t] /github_output
            EOT
            inherits = ["native"]
            output = ["type=docker"]
            tags = ["github_output"]
            target = "github_output"
          }
          EOF

      - name: Build the Docker image
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        env:
          NAME: "${{ secrets.changelog_name }}"
          EMAIL: "${{ secrets.changelog_email }}"
          CHANGE: "${{ inputs.changelog_message }}"
        with:
          files: |
            ./docker-bake.hcl
            ./docker-bake.override.hcl
          targets: native, github_output
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Output GA specific messages
        run: docker run --rm github_output bash -c "touch /github_output && cat /github_output"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-debs
          path: artifacts

  crossbuild:
    runs-on: ubuntu-latest
    name: Crossbuild packages
    needs: native
    strategy:
      matrix:
        arch: [armhf, arm64]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: env.BUILDKIT_STEP_LOG_MAX_SIZE=4194304

      - name: Build the Docker image
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        env:
          NAME: "${{ secrets.changelog_name }}"
          EMAIL: "${{ secrets.changelog_email }}"
          CHANGE: "${{ inputs.changelog_message }}"
        with:
          files: ./docker-bake.hcl
          targets: crossbuild-${{ matrix.arch }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crossbuild-${{ matrix.arch }}-debs
          path: artifacts

  publish:
    runs-on: ubuntu-latest
    name: Publish packages
    needs: [native, crossbuild]
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: new-debs
          pattern: "*-debs"
          merge-multiple: true

      - name: Get package version
        id: pkg
        run: |
          deb=$(ls new-debs/python3.14_*.deb | head -1)
          ver=$(echo "$deb" | sed 's/.*python3\.14_\([^_]*\)_.*/\1/')
          tag=$(echo "$ver" | tr '~' '-')
          echo "version=$ver" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: Python 3.14 ${{ steps.pkg.outputs.version }}
          files: new-debs/*.deb
          update_release_files: true

      - name: Install APT tools
        run: sudo apt-get install -y --no-install-recommends apt-utils dpkg-dev

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Build APT repo tree
        run: |
          mkdir -p apt-repo/pool/main/p/python3.14
          gpg --armor --export > apt-repo/syssi-python3.14-backport.gpg
          cp new-debs/*.deb apt-repo/pool/main/p/python3.14/

          cd apt-repo
          for arch in amd64 arm64 armhf; do
            mkdir -p dists/trixie-backports/main/binary-$arch
            dpkg-scanpackages --arch $arch pool/ 2>/dev/null \
              > dists/trixie-backports/main/binary-$arch/Packages
            gzip -kf dists/trixie-backports/main/binary-$arch/Packages
          done

          cat > /tmp/release.conf << 'EOF'
          APT::FTPArchive::Release::Origin "syssi";
          APT::FTPArchive::Release::Label "python3.14-backport";
          APT::FTPArchive::Release::Suite "trixie-backports";
          APT::FTPArchive::Release::Codename "trixie-backports";
          APT::FTPArchive::Release::Architectures "amd64 arm64 armhf";
          APT::FTPArchive::Release::Components "main";
          APT::FTPArchive::Release::Description "Python 3.14 backport for Debian trixie";
          APT::FTPArchive::Release::ValidTime 63072000;
          EOF
          apt-ftparchive -c /tmp/release.conf release dists/trixie-backports/ \
            > dists/trixie-backports/Release

          gpg --batch --yes --armor --detach-sign \
            --output dists/trixie-backports/Release.gpg \
            dists/trixie-backports/Release
          gpg --batch --yes --armor --clearsign \
            --output dists/trixie-backports/InRelease \
            dists/trixie-backports/Release

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apt-repo

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
